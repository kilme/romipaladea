<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romina Paladea</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #fdf0f5;
            --bg-gradient-end:   #f5edf8;
            --card-bg:           #fffafc;
            --text-main:         #7a6672;
            --text-soft:         #a8919e;
            --accent-rose:       #e8b4c3;
            --accent-lavender:   #c9b8e8;
            --accent-peach:      #f2c9b8;
            --accent-sage:       #b8d8c9;
            --accent-insta:      #dbb8e8;
            --accent-wa:         #b8ddc9;
            --shadow:            rgba(180, 140, 160, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }

        /* Decoración de fondo suave */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(232, 180, 195, 0.18) 0%, transparent 70%);
            top: -80px;
            right: -80px;
        }
        body::after {
            width: 360px;
            height: 360px;
            background: radial-gradient(circle, rgba(201, 184, 232, 0.15) 0%, transparent 70%);
            bottom: -60px;
            left: -60px;
        }

        .card {
            background: var(--card-bg);
            padding: 50px 44px 44px;
            border-radius: 28px;
            box-shadow:
                0 4px 6px var(--shadow),
                0 20px 40px var(--shadow),
                0 0 0 1px rgba(232, 180, 195, 0.2);
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Detalle decorativo superior */
        .card::before {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-rose), var(--accent-lavender), var(--accent-peach));
            border-radius: 2px;
            margin: 0 auto 28px;
        }

        .icon-wrap {
            font-size: 2.4rem;
            margin-bottom: 16px;
            line-height: 1;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            color: #9c7ea8;
            font-weight: 500;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-rose);
            margin-bottom: 10px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 184, 232, 0.4), transparent);
            margin: 22px 0;
        }

        .message {
            font-size: 0.97rem;
            color: var(--text-soft);
            line-height: 1.7;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            padding: 14px 22px;
            border-radius: 50px;
            font-family: 'Lato', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .btn svg {
            flex-shrink: 0;
        }

        .btn-insta {
            background: linear-gradient(135deg, #edd5f5, #e0c8f0);
            color: #8a69a8;
            border: 1px solid rgba(201, 184, 232, 0.5);
        }

        .btn-insta:hover {
            background: linear-gradient(135deg, #e5c8f0, #d6bce8);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(180, 140, 220, 0.2);
        }

        .btn-wa {
            background: linear-gradient(135deg, #c8e8d8, #b8d8c9);
            color: #4a8a6a;
            border: 1px solid rgba(184, 216, 201, 0.6);
        }

        .btn-wa:hover {
            background: linear-gradient(135deg, #bce0ce, #aacfbe);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(140, 200, 170, 0.25);
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.78rem;
            color: #c9b8c4;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrap">🌸</div>
        <p class="subtitle">Bienvenida</p>
        <h1>Romina Paladea</h1>

        <div class="divider"></div>

        <p class="message">
            Estoy preparando algo especial para vos.<br>
            Muy pronto podés encontrarme aquí.
        </p>

        <div class="links">
            <a href="https://www.instagram.com/romipaladea" target="_blank" class="btn btn-insta">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
                @romipaladea
            </a>
            <a href="https://wa.me/541158825314" target="_blank" class="btn btn-wa">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

        </div>

        <p class="footer-note">✨ Próximamente ✨</p>
    </div>
</body>

</html>
